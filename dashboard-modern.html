<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Bot Dashboard</title>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0d0d1a 0%, #1a1a2e 25%, #16213e 50%, #0f1629 75%, #0d0d1a 100%);
      min-height: 100vh;
      color: #fff;
      padding: 24px;
    }

    .dashboard {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 24px;
      backdrop-filter: blur(20px);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 8px 32px rgba(37, 211, 102, 0.3);
    }

    .logo h1 {
      font-size: 26px;
      font-weight: 700;
      background: linear-gradient(135deg, #25d366, #128c7e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: rgba(37, 211, 102, 0.15);
      border: 1px solid rgba(37, 211, 102, 0.3);
      border-radius: 30px;
      color: #25d366;
      font-size: 13px;
      font-weight: 600;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background: #25d366;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.9); }
    }

    .api-url {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      background: rgba(0, 0, 0, 0.4);
      padding: 10px 14px;
      border-radius: 10px;
      display: inline-block;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      border-radius: 16px 16px 0 0;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      background: rgba(255, 255, 255, 0.06);
    }

    .stat-icon {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.6;
    }

    .stat-1::before { background: linear-gradient(90deg, #667eea, #764ba2); }
    .stat-2::before { background: linear-gradient(90deg, #25d366, #128c7e); }
    .stat-3::before { background: linear-gradient(90deg, #f5576c, #f093fb); }
    .stat-4::before { background: linear-gradient(90deg, #4facfe, #00f2fe); }
    .stat-5::before { background: linear-gradient(90deg, #43e97b, #38f9d7); }
    .stat-6::before { background: linear-gradient(90deg, #fa709a, #fee140); }
    .stat-7::before { background: linear-gradient(90deg, #a8edea, #fed6e3); }
    .stat-8::before { background: linear-gradient(90deg, #4776E6, #8E54E9); }

    .stat-1 .stat-value { color: #a29bfe; }
    .stat-2 .stat-value { color: #25d366; }
    .stat-3 .stat-value { color: #fd79a8; }
    .stat-4 .stat-value { color: #74b9ff; }
    .stat-5 .stat-value { color: #00b894; }
    .stat-6 .stat-value { color: #ff7675; }
    .stat-7 .stat-value { color: #81ecec; }
    .stat-8 .stat-value { color: #a29bfe; }

    /* Content Grid */
    .content-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 24px;
    }

    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      overflow: hidden;
    }

    .card-full {
      grid-column: 1 / -1;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 22px;
      font-weight: 600;
      font-size: 14px;
    }

    .card-header-incoming {
      background: linear-gradient(90deg, rgba(37, 211, 102, 0.2), rgba(18, 140, 126, 0.1));
      border-bottom: 1px solid rgba(37, 211, 102, 0.2);
      color: #25d366;
    }

    .card-header-outgoing {
      background: linear-gradient(90deg, rgba(18, 140, 126, 0.2), rgba(7, 94, 84, 0.1));
      border-bottom: 1px solid rgba(18, 140, 126, 0.2);
      color: #128c7e;
    }

    .card-header-status {
      background: linear-gradient(90deg, rgba(245, 87, 108, 0.2), rgba(240, 147, 251, 0.1));
      border-bottom: 1px solid rgba(245, 87, 108, 0.2);
      color: #fd79a8;
    }

    .card-header-users {
      background: linear-gradient(90deg, rgba(79, 172, 254, 0.2), rgba(0, 242, 254, 0.1));
      border-bottom: 1px solid rgba(79, 172, 254, 0.2);
      color: #74b9ff;
    }

    .card-header-events {
      background: linear-gradient(90deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.1));
      border-bottom: 1px solid rgba(102, 126, 234, 0.2);
      color: #a29bfe;
    }

    .badge {
      background: rgba(255, 255, 255, 0.15);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
    }

    .card-body {
      max-height: 380px;
      overflow-y: auto;
      padding: 12px;
    }

    /* Messages */
    .message-item {
      display: flex;
      gap: 12px;
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 10px;
      background: rgba(255, 255, 255, 0.03);
      transition: all 0.2s ease;
    }

    .message-item:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .message-avatar {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
    }

    .message-in .message-avatar {
      background: linear-gradient(135deg, #25d366, #128c7e);
    }

    .message-out .message-avatar {
      background: linear-gradient(135deg, #128c7e, #075e54);
    }

    .message-content {
      flex: 1;
      min-width: 0;
    }

    .message-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .message-name {
      font-weight: 600;
      font-size: 14px;
    }

    .message-time {
      font-size: 11px;
      opacity: 0.5;
    }

    .message-text {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.05);
      padding: 10px 14px;
      border-radius: 12px;
      word-break: break-word;
    }

    /* Status */
    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 8px;
      background: rgba(255, 255, 255, 0.03);
    }

    .status-badge {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-sent {
      background: rgba(46, 125, 50, 0.2);
      color: #2e7d32;
    }

    .status-delivered {
      background: rgba(245, 124, 0, 0.2);
      color: #f57c00;
    }

    .status-read {
      background: rgba(33, 150, 243, 0.2);
      color: #2196f3;
    }

    /* Users */
    .user-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 10px;
      background: rgba(255, 255, 255, 0.03);
    }

    .user-avatar {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: #0d0d1a;
    }

    .user-info {
      flex: 1;
    }

    .user-name {
      font-weight: 600;
      font-size: 14px;
    }

    .user-id {
      font-size: 12px;
      opacity: 0.5;
      font-family: monospace;
    }

    /* Empty State */
    .empty {
      text-align: center;
      padding: 50px 20px;
      color: rgba(255, 255, 255, 0.4);
    }

    .empty span {
      font-size: 48px;
      display: block;
      margin-bottom: 12px;
    }

    /* Events Timeline */
    .events-body {
      max-height: 320px;
    }

    .timeline {
      padding: 8px 0;
    }

    .timeline-item {
      display: flex;
      gap: 14px;
      padding: 12px 0;
      position: relative;
    }

    .timeline-dot {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .timeline-content {
      flex: 1;
    }

    .timeline-title {
      font-weight: 600;
      font-size: 14px;
    }

    .timeline-time {
      font-size: 11px;
      opacity: 0.5;
      margin-left: 8px;
    }

    .timeline-text {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      margin-top: 6px;
      background: rgba(255, 255, 255, 0.04);
      padding: 8px 12px;
      border-radius: 8px;
    }

    /* Loading */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
    }

    .spinner {
      width: 56px;
      height: 56px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #25d366;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 20px;
      color: rgba(255, 255, 255, 0.4);
      font-size: 12px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .content-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .header-top {
        flex-direction: column;
        gap: 16px;
      }
      
      body {
        padding: 16px;
      }
      
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const API_URL = 'http://localhost:3000/api/alldata';
    const SEND_URL = 'http://localhost:3000/api/send';
    const SERVER_URL = 'http://localhost:3000';

    function App() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [sendTo, setSendTo] = useState('');
      const [sendText, setSendText] = useState('');
      const [sending, setSending] = useState(false);
      const [sendError, setSendError] = useState(null);
      const [sendSuccess, setSendSuccess] = useState(false);

      useEffect(() => {
        fetchData();
        const interval = setInterval(fetchData, 5000);
        return () => clearInterval(interval);
      }, []);

      const fetchData = async () => {
        try {
          const response = await fetch(API_URL);
          if (!response.ok) throw new Error('Failed to fetch');
          const result = await response.json();
          setData(result);
          setError(null);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      const handleSend = async (e) => {
        e.preventDefault();
        if (!sendTo || !sendText) return;
        
        setSending(true);
        setSendError(null);
        setSendSuccess(false);
        
        try {
          const response = await fetch(SEND_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ to: sendTo, text: sendText })
          });
          const result = await response.json();
          if (!response.ok) throw new Error(result.error || 'Failed to send');
          setSendSuccess(true);
          setSendTo('');
          setSendText('');
          fetchData();
          setTimeout(() => setSendSuccess(false), 3000);
        } catch (err) {
          setSendError(err.message);
        } finally {
          setSending(false);
        }
      };

      const stats = data?.stats || {};
      const incoming = data?.incoming || [];
      const outgoing = data?.outgoing || [];
      const statuses = data?.statuses || [];
      const users = data?.users || [];
      const events = data?.events || [];

      return (
        <div className="dashboard">
          <header className="header">
            <div className="header-top">
              <div className="logo">
                <div className="logo-icon">💬</div>
                <h1>WhatsApp Bot</h1>
              </div>
              <div className="live-badge">
                <span className="live-dot"></span>
                Live
              </div>
            </div>
            <div className="api-url">📡 {API_URL}</div>
          </header>

          <div className="card card-full" style={{ marginBottom: 24 }}>
            <div className="card-header" style={{ background: 'linear-gradient(135deg, #25d366, #128c7e)' }}>
              <span>📤 Send Message</span>
            </div>
            <div className="card-body">
              <form onSubmit={handleSend} style={{ display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'center' }}>
                <input 
                  type="text" 
                  placeholder="Phone number (e.g., 1234567890)" 
                  value={sendTo}
                  onChange={(e) => setSendTo(e.target.value)}
                  style={{
                    flex: '1 1 200px',
                    padding: '12px 16px',
                    borderRadius: 10,
                    border: '1px solid rgba(255,255,255,0.2)',
                    background: 'rgba(255,255,255,0.05)',
                    color: '#fff',
                    fontSize: 14,
                    outline: 'none'
                  }}
                />
                <input 
                  type="text" 
                  placeholder="Message text" 
                  value={sendText}
                  onChange={(e) => setSendText(e.target.value)}
                  style={{
                    flex: '2 1 300px',
                    padding: '12px 16px',
                    borderRadius: 10,
                    border: '1px solid rgba(255,255,255,0.2)',
                    background: 'rgba(255,255,255,0.05)',
                    color: '#fff',
                    fontSize: 14,
                    outline: 'none'
                  }}
                />
                <button 
                  type="submit" 
                  disabled={sending || !sendTo || !sendText}
                  style={{
                    padding: '12px 24px',
                    borderRadius: 10,
                    border: 'none',
                    background: sending ? '#666' : 'linear-gradient(135deg, #25d366, #128c7e)',
                    color: '#fff',
                    fontSize: 14,
                    fontWeight: 600,
                    cursor: sending ? 'not-allowed' : 'pointer'
                  }}
                >
                  {sending ? 'Sending...' : 'Send'}
                </button>
              </form>
              {sendError && <div style={{ color: '#ff6b6b', marginTop: 12 }}>Error: {sendError}</div>}
              {sendSuccess && <div style={{ color: '#25d366', marginTop: 12 }}>Message sent successfully!</div>}
            </div>
          </div>

          <div className="stats-grid">
            <div className="stat-card stat-1">
              <div className="stat-icon">📊</div>
              <div className="stat-value">{stats.totalEvents || 0}</div>
              <div className="stat-label">Total Events</div>
            </div>
            <div className="stat-card stat-2">
              <div className="stat-icon">📥</div>
              <div className="stat-value">{stats.incomingCount || 0}</div>
              <div className="stat-label">Received</div>
            </div>
            <div className="stat-card stat-3">
              <div className="stat-icon">📤</div>
              <div className="stat-value">{stats.outgoingCount || 0}</div>
              <div className="stat-label">Sent</div>
            </div>
            <div className="stat-card stat-4">
              <div className="stat-icon">👥</div>
              <div className="stat-value">{stats.uniqueUsers || 0}</div>
              <div className="stat-label">Users</div>
            </div>
            <div className="stat-card stat-5">
              <div className="stat-icon">✅</div>
              <div className="stat-value">{stats.sentStatus || 0}</div>
              <div className="stat-label">Sent</div>
            </div>
            <div className="stat-card stat-6">
              <div className="stat-icon">📬</div>
              <div className="stat-value">{stats.deliveredStatus || 0}</div>
              <div className="stat-label">Delivered</div>
            </div>
            <div className="stat-card stat-7">
              <div className="stat-icon">👁️</div>
              <div className="stat-value">{stats.readStatus || 0}</div>
              <div className="stat-label">Read</div>
            </div>
            <div className="stat-card stat-8">
              <div className="stat-icon">💬</div>
              <div className="stat-value">{stats.totalMessages || 0}</div>
              <div className="stat-label">Messages</div>
            </div>
          </div>

          <div className="content-grid">
            <div className="card">
              <div className="card-header card-header-incoming">
                <span>📥 Incoming Messages</span>
                <span className="badge">{incoming.length}</span>
              </div>
              <div className="card-body">
                {incoming.length === 0 ? (
                  <div className="empty"><span>📭</span>No messages</div>
                ) : incoming.slice(0, 6).map((e, i) => (
                  <div key={i} className="message-item message-in">
                    <div className="message-avatar">{e.name?.charAt(0) || 'U'}</div>
                    <div className="message-content">
                      <div className="message-header">
                        <span className="message-name">{e.name}</span>
                        <span className="message-time">{e.displayTime}</span>
                      </div>
                      <div className="message-text">{e.body}</div>
                      {e.fileUrl && (
                        <div className="message-media">
                          {e.msgType === 'image' && <img src={e.fileUrl} alt="image" style={{maxWidth:'200px',borderRadius:'8px',marginTop:'8px'}} />}
                          {e.msgType === 'audio' && <audio src={e.fileUrl} controls style={{marginTop:'8px'}} />}
                          {e.msgType === 'document' && <a href={e.fileUrl} target="_blank" style={{display:'block',marginTop:'8px',color:'#25d366'}}>📄 Download Document</a>}
                          {e.msgType === 'video' && <video src={e.fileUrl} controls style={{maxWidth:'200px',marginTop:'8px'}} />}
                        </div>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div className="card">
              <div className="card-header card-header-outgoing">
                <span>📤 Outgoing Messages</span>
                <span className="badge">{outgoing.length}</span>
              </div>
              <div className="card-body">
                {outgoing.length === 0 ? (
                  <div className="empty"><span>📤</span>No messages</div>
                ) : outgoing.slice(0, 6).map((e, i) => (
                  <div key={i} className="message-item message-out">
                    <div className="message-content">
                      <div className="message-header">
                        <span className="message-name">To: {e.from}</span>
                        <span className="message-time">{e.displayTime}</span>
                      </div>
                      <div className="message-text">{e.body}</div>
                      {e.fileUrl && (
                        <div className="message-media">
                          {e.msgType === 'image' && <img src={e.fileUrl} alt="image" style={{maxWidth:'200px',borderRadius:'8px',marginTop:'8px'}} />}
                          {e.msgType === 'audio' && <audio src={e.fileUrl} controls style={{marginTop:'8px'}} />}
                          {e.msgType === 'document' && <a href={e.fileUrl} target="_blank" style={{display:'block',marginTop:'8px',color:'#25d366'}}>📄 Download Document</a>}
                          {e.msgType === 'video' && <video src={e.fileUrl} controls style={{maxWidth:'200px',marginTop:'8px'}} />}
                        </div>
                      )}
                    </div>
                    <div className="message-avatar">✓</div>
                  </div>
                ))}
              </div>
            </div>

            <div className="card">
              <div className="card-header card-header-status">
                <span>📊 Message Status</span>
                <span className="badge">{statuses.length}</span>
              </div>
              <div className="card-body">
                {statuses.length === 0 ? (
                  <div className="empty"><span>📊</span>No status</div>
                ) : statuses.slice(0, 6).map((e, i) => (
                  <div key={i} className="status-item">
                    <span className={`status-badge status-${e.status}`}>
                      {e.status === 'read' ? '👁️ Read' : e.status === 'delivered' ? '📬 Delivered' : '✅ Sent'}
                    </span>
                    <span className="message-time">{e.displayTime}</span>
                  </div>
                ))}
              </div>
            </div>

            <div className="card">
              <div className="card-header card-header-users">
                <span>👥 Active Users</span>
                <span className="badge">{users.length}</span>
              </div>
              <div className="card-body">
                {users.length === 0 ? (
                  <div className="empty"><span>👤</span>No users</div>
                ) : users.slice(0, 6).map((u, i) => (
                  <div key={i} className="user-item">
                    <div className="user-avatar">{u.name?.charAt(0) || 'U'}</div>
                    <div className="user-info">
                      <span className="user-name">{u.name || 'Unknown'}</span>
                      <span className="user-id">{u.wa_id}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div className="card card-full">
            <div className="card-header card-header-events">
              <span>📋 All Events Log</span>
              <span className="badge">{events.length}</span>
            </div>
            <div className="card-body events-body">
              {events.length === 0 ? (
                <div className="empty"><span>📋</span>No events</div>
              ) : (
                <div className="timeline">
                  {events.slice(0, 12).map((e, i) => (
                    <div key={i} className="timeline-item">
                      <div className="timeline-dot">
                        {e.type === 'status' ? '📊' : e.direction === 'incoming' ? '📥' : '📤'}
                      </div>
                      <div className="timeline-content">
                        <span className="timeline-title">
                          {e.type === 'status' ? `Status: ${e.status}` : e.direction === 'incoming' ? e.name : `To: ${e.from}`}
                        </span>
                        <span className="timeline-time">{e.displayTime}</span>
                        {e.body && <div className="timeline-text">{e.body}</div>}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>

          <footer className="footer">
            <p>Last updated: {new Date(data?.timestamp || new Date()).toLocaleString()}</p>
            <p>Auto-refreshes every 5 seconds</p>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
